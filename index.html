<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개인 프롬프트 저장소</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <p class="eyebrow">Prompt Vault</p>
        <h1>개인 프롬프트 저장소</h1>
        <p>자주 쓰는 제작 프롬프트를 카테고리별로 모아두고 바로 복사할 수 있는 라이브러리</p>
      </div>

      <label class="mobile-category-picker" for="mobile-category-select">
        <span>카테고리 선택</span>
        <select id="mobile-category-select"></select>
      </label>

      <div class="sidebar-shortcuts">
        <p class="sidebar-section-title">바로가기</p>
        <a class="shortcut-link" href="./image-prompts.html">이미지 분위기 프롬프트</a>
        <a class="shortcut-link" href="./lyriccraft-ai.html">LyricCraft AI</a>
        <a class="shortcut-link" href="./lyricvisualizer-pro.html">LyricVisualizer Pro</a>
      </div>

      <nav class="category-nav" id="category-nav" aria-label="프롬프트 카테고리"></nav>
    </aside>

    <main class="workspace">
      <section class="library-panel">
        <div class="panel-top">
          <div>
            <p class="panel-label">Library</p>
            <h2>프롬프트 목록</h2>
          </div>
          <span class="count-badge" id="prompt-count">0개</span>
        </div>

        <label class="search-box" for="search-input">
          <span>빠른 검색</span>
          <input id="search-input" type="search" placeholder="제목, 요약, 본문 검색" />
        </label>

        <div class="prompt-list" id="prompt-list"></div>
      </section>

      <section class="detail-panel" id="detail-panel">
        <div class="detail-header">
          <div class="detail-copy">
            <p class="detail-kicker" id="detail-category"></p>
            <h2 id="detail-title"></h2>
            <p class="detail-description" id="detail-description"></p>
            <p class="detail-meta" id="detail-meta"></p>
          </div>

          <div class="detail-actions">
            <button class="action-btn primary" id="copy-prompt-btn" type="button">본문 복사</button>
            <button class="action-btn" id="copy-full-btn" type="button">제목+본문 복사</button>
          </div>
        </div>

        <pre class="prompt-content" id="detail-content"></pre>
      </section>

      <section class="empty-state" id="empty-state" hidden>
        <p class="empty-eyebrow">No Results</p>
        <h2>검색 결과가 없습니다.</h2>
        <p>검색어를 줄이거나 다른 카테고리를 선택해 보세요.</p>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">복사되었습니다.</div>

  <script type="module" src="./app.js"></script>
</body>
</html>

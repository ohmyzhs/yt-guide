    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
    :root { --primary: #38bdf8; --bg-dark: #020617; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-dark); color: #f8fafc; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .input-field { background: rgba(0,0,0,0.3); border: 1px solid #334155; border-radius: 0.75rem; padding: 0.75rem; width: 100%; color: white; font-size: 0.875rem; }
    .input-field:focus { outline: none; border-color: var(--primary); }
    .label-tag { font-size: 10px; font-weight: 800; color: #7dd3fc; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; display: block; }
    .loader { border-top-color: var(--primary); animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .card-anim { transition: all 0.2s ease; }
    .card-anim:hover { transform: translateY(-2px); border-color: var(--primary); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .tab-active { background: #0284c7; color: white; }
    .tab-inactive { background: #1e293b; color: #94a3b8; }
  </style>
</head>

  <script>
    const generatedResults = {};

    function toggleElectronicSubgenre() {
      const genre = document.getElementById('genre').value;
      const subContainer = document.getElementById('electronicSubContainer');
      subContainer.style.display = genre === "일렉트로닉" ? "block" : "none";
    }

    function toggleChar2() {
      const char2Age = document.getElementById('char2_age').value;
      const raceSelect = document.getElementById('char2_race');
      const genderSelect = document.getElementById('char2_gender');
      if (char2Age === "None") {
        raceSelect.disabled = true;
        genderSelect.disabled = true;
        raceSelect.style.opacity = "0.5";
        genderSelect.style.opacity = "0.5";
      } else {
        raceSelect.disabled = false;
        genderSelect.disabled = false;
        raceSelect.style.opacity = "1";
        genderSelect.style.opacity = "1";
      }
    }

    function getInputs() {
      return {
        title: document.getElementById('songTitle').value || "No Title",
        genre: document.getElementById('genre').value,
        electronicSub: document.getElementById('genre').value === "일렉트로닉" ? document.getElementById('electronicSub').value : "",
        mood: document.getElementById('mood').value,
        style: document.getElementById('visualStyle').value,
        timeline: document.getElementById('timeline').value,
        outputMode: document.getElementById('outputMode').value,
        c1: `Age: ${document.getElementById('char1_age').value}, Race: ${document.getElementById('char1_race').value}, Gender: ${document.getElementById('char1_gender').value}`,
        c2: document.getElementById('char2_age').value === "None" ? "" :
          `Age: ${document.getElementById('char2_age').value}, Race: ${document.getElementById('char2_race').value}, Gender: ${document.getElementById('char2_gender').value}`,
        lyrics: document.getElementById('lyrics').value
      };
    }

    function buildSystemPrompt(mode, inputs) {
      const fullGenre = inputs.electronicSub ? `${inputs.genre} (${inputs.electronicSub})` : inputs.genre;

      if (mode === 'en') {
        return `You are a world-class cinematic prompt engineer for high-end AI music video production (Midjourney + Luma/Runway).
Analyze the lyrics and all settings carefully. Create a rich, emotionally coherent storyboard with **exactly 40 scenes**.

PROJECT CONTEXT:
- Song Title: ${inputs.title}
- Genre: ${fullGenre}
- Mood/Atmosphere: ${inputs.mood}
- Selected Visual Style: ${inputs.style}
- Era/Timeline: ${inputs.timeline}
- Main Character 1: ${inputs.c1}
${inputs.c2 ? `- Main Character 2: ${inputs.c2}` : '- Main Character 2: 없음 (단 한 명의 주인공만 등장)'}

CRITICAL REQUIREMENTS:
1. Generate **exactly 40** logical, sequential scenes following the lyrical narrative flow.
2. Each **scene_name** must be written in **Korean** and be descriptive.
3. **All "prompt" fields (both image_prompts and video_prompts) must be written entirely in natural, highly detailed English.**
   - Never output any Korean text inside the prompt except for scene_name.
   - Structure each prompt as: Selected Visual Style + who + when + where + what + how + why + additional cinematic details (lighting, camera angle, emotion, texture, atmosphere, etc.).
4. Maintain the exact selected visual style strongly without overwriting it with generic cinematic terms.
5. If Main Character 2 is "없음", never include Character 2 in any scene.

OUTPUT FORMAT (Strict JSON only, no extra text):
{
  "image_prompts": [{"scene_name": "한국어 장면 제목", "prompt": "Very detailed English prompt here..."}],
  "video_prompts": [{"scene_name": "한국어 장면 제목", "prompt": "Very detailed English motion prompt here..."}]
}`;
      }

      return `You are a world-class cinematic prompt engineer for high-end AI music video production (Midjourney + Luma/Runway).
Analyze the lyrics and all settings carefully. Create a rich, emotionally coherent storyboard with **exactly 40 scenes**.

PROJECT CONTEXT:
- Song Title: ${inputs.title}
- Genre: ${fullGenre}
- Mood/Atmosphere: ${inputs.mood}
- Selected Visual Style: ${inputs.style}
- Era/Timeline: ${inputs.timeline}
- Main Character 1: ${inputs.c1}
${inputs.c2 ? `- Main Character 2: ${inputs.c2}` : '- Main Character 2: 없음 (단 한 명의 주인공만 등장)'}

CRITICAL REQUIREMENTS:
1. Generate **exactly 40** logical, sequential scenes following the lyrical narrative.
2. Each scene_name must be in **Korean** and descriptive.
3. 프롬프트는 반드시 다음 순서로 구성: 선택된 Visual Style + 누가 + 언제 + 어디서 + 무엇을 + 어떻게 + 왜 + 기타 세부 명령
4. Main Character 2가 "없음"인 경우, 모든 장면에서 Main Character 2를 절대 등장시키지 말 것. 오직 Main Character 1만으로 스토리를 구성.

OUTPUT FORMAT (Strict JSON only):
{
  "image_prompts": [{"scene_name": "한국어 장면 제목", "prompt": "프롬프트"}],
  "video_prompts": [{"scene_name": "한국어 장면 제목", "prompt": "프롬프트"}]
}`;
    }

    async function fetchGemini(body, retries = 5) {
      for (let i = 0; i <= retries; i += 1) {
        try {
          const response = await fetch('/api/gemini-generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (response.ok) return await response.json();
          const errorData = await response.json().catch(() => ({}));
          if (i === retries) {
            throw new Error(errorData?.details?.error?.message || errorData?.error || "API Error");
          }
        } catch (e) {
          if (i === retries) throw e;
          await new Promise((res) => setTimeout(res, Math.pow(2, i) * 1000));
        }
      }
      throw new Error("API Error");
    }

    async function requestPrompts(mode, inputs) {
      const model = "gemini-2.5-flash";
      const systemPrompt = buildSystemPrompt(mode, inputs);
      const userQuery = `Song Lyrics to Process:\n${inputs.lyrics}`;
      const result = await fetchGemini({
        model,
        payload: {
          contents: [{ role: "user", parts: [{ text: systemPrompt + "\n\n" + userQuery }] }],
          generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
        }
      });

      const content = result.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!content) throw new Error("Empty response");
      const cleanContent = content.trim().replace(/```json|```/g, "").trim();
      return JSON.parse(cleanContent);
    }

    async function generate() {
      const inputs = getInputs();
      if (!inputs.lyrics.trim()) {
        alert("가사를 입력해 주세요.");
        return;
      }

      document.getElementById('empty').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('result').innerHTML = '';
      document.getElementById('loadingMessage').textContent =
        inputs.outputMode === 'both'
          ? '한글 프롬프트와 영어 프롬프트를 순차 생성 중입니다. 약간 더 오래 걸릴 수 있습니다.'
          : '약 20~40초 정도 소요될 수 있습니다. (40장면 고품질 생성)';

      try {
        if (inputs.outputMode === 'both') {
          const [koData, enData] = await Promise.all([
            requestPrompts('ko', inputs),
            requestPrompts('en', inputs)
          ]);
          generatedResults.ko = koData;
          generatedResults.en = enData;
          renderUI([
            { key: 'ko', label: '한글 프롬프트 출력', data: koData },
            { key: 'en', label: '영어 프롬프트 출력', data: enData }
          ]);
        } else {
          const data = await requestPrompts(inputs.outputMode, inputs);
          generatedResults[inputs.outputMode] = data;
          renderUI([
            {
              key: inputs.outputMode,
              label: inputs.outputMode === 'ko' ? '한글 프롬프트 출력' : '영어 프롬프트 출력',
              data
            }
          ]);
        }
      } catch (e) {
        console.error(e);
        document.getElementById('loading').innerHTML = `
          <div class="text-center p-8 bg-red-900/20 border border-red-500/50 rounded-3xl">
            <p class="text-red-400 font-bold mb-4">오류가 발생했습니다.</p>
            <p class="text-slate-400 text-sm">${e.message}</p>
            <button onclick="location.reload()" class="mt-4 bg-red-600 px-6 py-2 rounded-lg text-white">재시도</button>
          </div>`;
      }
    }

    function buildPanel(panel) {
      return `
        <section class="space-y-4" data-panel-root="${panel.key}">
          <div class="glass rounded-3xl border border-slate-700 p-4 md:p-5">
            <div class="mb-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
              <div>
                <p class="text-[10px] font-black uppercase tracking-[0.24em] text-sky-400">${panel.label}</p>
                <h3 class="mt-1 text-lg font-bold text-white">${panel.data.image_prompts?.length || 0}개 이미지 / ${panel.data.video_prompts?.length || 0}개 영상 프롬프트</h3>
              </div>
              <div class="flex gap-2">
                <button data-action="copy-all" data-panel="${panel.key}" data-type="image" class="rounded-xl bg-emerald-600 px-4 py-2 text-xs font-bold text-white transition hover:bg-emerald-700">이미지 전체 복사</button>
                <button data-action="copy-all" data-panel="${panel.key}" data-type="video" class="rounded-xl bg-emerald-600 px-4 py-2 text-xs font-bold text-white transition hover:bg-emerald-700">영상 전체 복사</button>
              </div>
            </div>
            <div class="flex gap-2">
              <button data-action="switch-tab" data-panel="${panel.key}" data-tab="image" id="tab-${panel.key}-image" class="panel-tab tab-active px-6 py-3 rounded-xl font-bold flex-1 transition-all">Midjourney 이미지 프롬프트 (${panel.data.image_prompts?.length || 0})</button>
              <button data-action="switch-tab" data-panel="${panel.key}" data-tab="video" id="tab-${panel.key}-video" class="panel-tab tab-inactive px-6 py-3 rounded-xl font-bold flex-1 transition-all">Luma/Runway 영상 프롬프트 (${panel.data.video_prompts?.length || 0})</button>
            </div>
          </div>
          <div id="${panel.key}-imageContent" class="panel-content space-y-4 max-h-[68vh] overflow-y-auto pr-2 no-scrollbar"></div>
          <div id="${panel.key}-videoContent" class="panel-content hidden space-y-4 max-h-[68vh] overflow-y-auto pr-2 no-scrollbar"></div>
        </section>
      `;
    }

    function renderCards(list, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = list.map((item, i) => `
        <div class="prompt-card glass p-5 rounded-2xl border-l-4 border-l-sky-500 card-anim">
          <div class="flex justify-between items-start mb-2 gap-4">
            <div>
              <span class="text-[10px] font-black text-sky-400 uppercase">Scene ${String(i + 1).padStart(2, '0')}</span>
              <h4 class="text-sm font-bold text-white mt-0.5">${item.scene_name}</h4>
            </div>
            <button data-action="copy-one" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-slate-300 font-bold transition-all flex items-center gap-1">
              <span>COPY</span>
            </button>
          </div>
          <p class="prompt-text text-xs text-slate-300 font-mono leading-relaxed bg-black/50 p-4 rounded-xl border border-white/5 select-all whitespace-pre-wrap">${item.prompt}</p>
        </div>
      `).join('');
    }

    function renderUI(panels) {
      const result = document.getElementById('result');
      document.getElementById('loading').classList.add('hidden');
      result.classList.remove('hidden');
      result.innerHTML = panels.map(buildPanel).join('');

      panels.forEach((panel) => {
        renderCards(panel.data.image_prompts || [], `${panel.key}-imageContent`);
        renderCards(panel.data.video_prompts || [], `${panel.key}-videoContent`);
        switchTab(panel.key, 'image');
      });
    }

    function copyCardPrompt(button) {
      const text = button.closest('.prompt-card').querySelector('.prompt-text').innerText;
      navigator.clipboard.writeText(text);
      const original = button.innerHTML;
      button.innerHTML = '<span class="text-green-400">COPIED</span>';
      setTimeout(() => { button.innerHTML = original; }, 1500);
    }

    function copyAllPrompts(panelKey, type) {
      const containerId = type === 'image' ? `${panelKey}-imageContent` : `${panelKey}-videoContent`;
      const texts = Array.from(document.querySelectorAll(`#${containerId} .prompt-text`))
        .map((p) => p.innerText.trim())
        .filter((t) => t.length > 30);
      if (texts.length === 0) {
        alert("먼저 생성해주세요.");
        return;
      }
      navigator.clipboard.writeText(texts.join('\n\n\n'));
      alert("모든 프롬프트가 복사되었습니다!");
    }

    function switchTab(panelKey, id) {
      ['image', 'video'].forEach((type) => {
        const content = document.getElementById(`${panelKey}-${type}Content`);
        const tab = document.getElementById(`tab-${panelKey}-${type}`);
        if (!content || !tab) return;
        if (type === id) {
          content.classList.remove('hidden');
          tab.classList.add('tab-active');
          tab.classList.remove('tab-inactive');
        } else {
          content.classList.add('hidden');
          tab.classList.remove('tab-active');
          tab.classList.add('tab-inactive');
        }
      });
    }

    document.getElementById('result').addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const action = button.dataset.action;
      if (action === 'copy-one') copyCardPrompt(button);
      if (action === 'copy-all') copyAllPrompts(button.dataset.panel, button.dataset.type);
      if (action === 'switch-tab') switchTab(button.dataset.panel, button.dataset.tab);
    });

    window.onload = () => {
      toggleElectronicSubgenre();
      toggleChar2();
      document.getElementById('generateBtn').addEventListener('click', generate);
      document.getElementById('char2_age').addEventListener('change', toggleChar2);
    };
  </script>
</body>
</html>
